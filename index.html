<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简介</title>
</head>
<body>
    <!-- 头部logo区域 -->
        <header class="header">
        <div class="header-content">
            <div class="logo">
                <img src="./assert/touxiang.jpg" alt="dasuaib" class="logo-img">
                <div class="logo-text">
                    <h1>墨香书屋</h1>
                    <p class="tagline">在文字中寻找诗意</p>
                </div>
            </div>
        </div>
    </header>

       <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <ul class="nav-menu">
                <li><a href="#life" class="nav-link">个人生活</a></li>
                <li><a href="#hobbies" class="nav-link">兴趣爱好</a></li>
                <li><a href="#courses" class="nav-link">专业课程</a></li>
                <li><a href="#contact" class="nav-link">联系我</a></li>
            </ul>
        </div>
    </nav>
    <main class="main-content">
         <!-- 轮播图区域 -->
        <section class="carousel-section">
            <div class="carousel">
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="./assert/guihugongyuan.jpg" alt="午后阅读时光">
                        <div class="carousel-caption">
                            <h3>午后阅读时光</h3>
                            <p>在阳光中品味文字的温度</p>
                        </div>
                    </div>
                    <div class="carousel-item">
                        <img src="./assert/xuedaihui.jpg" alt="学代会">
                        <div class="carousel-caption">
                            <h3>学代会</h3>
                            <p>在自然中寻找内心的宁静</p>
                        </div>
                    </div>
                    <div class="carousel-item">
                        <img src="./assert/yuandan.jpg" alt="雨中咖啡馆">
                        <div class="carousel-caption">
                            <h3>元旦晚会</h3>
                            <p>一杯咖啡，一段故事</p>
                        </div>
                    </div>
                </div>
                <button class="carousel-btn prev" onclick="changeSlide(-1)">❮</button>
                <button class="carousel-btn next" onclick="changeSlide(1)">❯</button>
                <div class="carousel-dots">
                    <span class="dot active" onclick="goToSlide(0)"></span>
                    <span class="dot" onclick="goToSlide(1)"></span>
                    <span class="dot" onclick="goToSlide(2)"></span>
                </div>
            </div>
        </section>






        
    </main>

</body>
</html>
